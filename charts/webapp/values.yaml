replicaCount: 2

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

containerPort: 80

service:
  type: ClusterIP
  port: 80

route:
  # Supported values: ingress, gateway
  type: ingress

  # Demo hostname. Use curl with:
  #   curl -H 'Host: webapp.local' http://<nlb-dns-name>
  hostname: webapp.local

  ingress:
    className: traefik
    annotations: {}

  gateway:
    # The chart creates a namespace-local Gateway by default.
    # This keeps the demo self-contained and avoids cross-namespace references.
    create: true
    name: ""
    gatewayClassName: traefik
    httpSectionName: web
    httpsSectionName: websecure
    # These must match Traefik's entryPoint ports (traefik chart's
    # `ports.web.port` / `ports.websecure.port`), not the externally
    # exposed Service/NLB port. Traefik's Gateway provider matches a
    # Gateway listener's port directly against its entryPoint port, and
    # this cluster's Traefik entryPoints are on 8000/8443 (the Service
    # still fronts them as 80/443).
    httpPort: 8000
    httpsPort: 8443
    listenerHostname: ""

tls:
  enabled: true
  secretName: ""

certManager:
  enabled: true

  # Demo-only self-signed issuer.
  # In a real environment this would normally be replaced by an internal CA,
  # private PKI, or public ACME issuer.
  selfSigned:
    enabled: true
    issuerName: ""

  certificate:
    enabled: true
    duration: 2160h
    renewBefore: 360h

    # Used only when selfSigned.enabled=false.
    issuerRef:
      name: ""
      kind: Issuer
      group: cert-manager.io

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
